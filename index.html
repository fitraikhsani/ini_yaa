<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ISAN FLOATING COUNTER</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0d1117; font-family: sans-serif; }
        
        /* TOMBOL BULAT MELAYANG */
        #floating-bot {
            position: fixed; top: 100px; left: 20px;
            width: 75px; height: 75px;
            background: rgba(0, 242, 255, 0.9); border-radius: 50%;
            z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,242,255,0.6);
            cursor: move; touch-action: none;
            border: 2px solid #fff;
            backdrop-filter: blur(5px);
        }

        /* TAMPILAN ANGKA DI DALAM BULATAN */
        #counter-text { font-size: 16px; font-weight: bold; color: #000; margin: 0; }
        #status-text { font-size: 9px; font-weight: bold; color: #000; text-transform: uppercase; margin-top: -2px; }

        /* JENDELA KONTEN */
        #main-view { width: 100%; height: 100%; border: none; background: #fff; }

        /* PROGRESS RING (Garis Melingkar) */
        .ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 4px solid rgba(255,255,255,0.3);
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="floating-bot">
    <div class="ring"></div>
    <div id="counter-text">0/30</div>
    <div id="status-text">WAITING</div>
</div>

<iframe id="main-view" name="view" sandbox="allow-scripts allow-same-origin allow-forms" src="https://www.bing.com"></iframe>

<script>
    const BOT = document.getElementById('floating-bot');
    const FRAME = document.getElementById('main-view');
    const COUNT_EL = document.getElementById('counter-text');
    const STATUS_EL = document.getElementById('status-text');
    
    const SEARCH = [
        "Berita Medan Tembung hari ini", "Harga emas Antam Medan", "Metode AHP Sistem Informasi", 
        "Wisata Sumatera Utara 2026", "Jurnal SPK SAW Terbaru", "Loker IT Medan", 
        "Peta GIS Medan Tembung", "Update Teknologi AI", "Kuliner Tembung Enak", "Visual Studio Code Tutorial"
    ];

    const MSN = [
        "https://www.msn.com/id-id/berita/other/ar-AA22WWCR", "https://www.msn.com/id-id/hiburan/berita/ar-AA22Y4xE",
        "https://www.msn.com/id-id/berita/other/ar-AA22S081", "https://www.msn.com/id-id/ekonomi/bisnis/ar-AA22Y8H8",
        "https://www.msn.com/id-id/ekonomi/ekonomi/ar-AA22XAhc", "https://www.msn.com/id-id/berita/other/ar-AA22Upk5",
        "https://www.msn.com/id-id/berita/other/ar-AA22XbnI", "https://www.msn.com/id-id/berita/other/ar-AA22WXg1",
        "https://www.msn.com/id-id/berita/other/ar-AA21JK92", "https://www.msn.com/id-id/hiburan/berita/ar-AA22XNTb",
        "https://www.msn.com/id-id/berita/other/ar-AA22RHnA", "https://www.msn.com/id-id/ekonomi/other/ar-AA22Txxu",
        "https://www.msn.com/id-id/berita/nasional/ar-AA22UJRX", "https://www.msn.com/id-id/berita/other/ar-AA22XlBH",
        "https://www.msn.com/id-id/berita/other/ar-AA1Vuwsr", "https://www.msn.com/id-id/berita/other/ar-AA22T5B9",
        "https://www.msn.com/id-id/ekonomi/ekonomi/ar-AA22UlQy", "https://www.msn.com/id-id/berita/other/ar-AA22X7gM",
        "https://www.msn.com/id-id/berita/nasional/ar-AA22U9z1", "https://www.msn.com/id-id/berita/other/ar-AA22W8L9"
    ];

    let step = 0;
    let running = false;
    let xOffset = 0, yOffset = 0;
    let active = false;

    // DRAG LOGIC
    BOT.addEventListener("touchstart", (e) => {
        initialX = e.touches[0].clientX - xOffset;
        initialY = e.touches[0].clientY - yOffset;
        active = true;
    }, false);

    BOT.addEventListener("touchend", () => { active = false; }, false);

    BOT.addEventListener("touchmove", (e) => {
        if (active) {
            e.preventDefault();
            let currentX = e.touches[0].clientX - initialX;
            let currentY = e.touches[0].clientY - initialY;
            xOffset = currentX; yOffset = currentY;
            BOT.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
        }
    }, false);

    // START LOGIC
    BOT.onclick = () => {
        if (!running) {
            running = true;
            STATUS_EL.innerText = "RUNNING";
            nextTask();
        }
    };

    function nextTask() {
        if (step >= 30) {
            COUNT_EL.innerText = "30/30";
            STATUS_EL.innerText = "DONE";
            alert("Misi Selesai, San! Semua poin harusnya sudah masuk.");
            return;
        }

        COUNT_EL.innerText = `${step}/30`;
        
        let target = (step < 10) ? 
            `https://www.bing.com/search?q=${encodeURIComponent(SEARCH[step])}` : 
            MSN[step - 10];

        FRAME.src = target;
        step++;
        
        // 5 Detik per Tugas
        setTimeout(nextTask, 5000);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISAN FARMER v21.0</title>
    <style>
        :root { --neon: #00f2ff; --dark: #0d1117; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Dashboard Atas yang Sangat Tipis */
        #dashboard {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(22, 27, 34, 0.95); border-bottom: 2px solid var(--neon);
            z-index: 999999; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box; backdrop-filter: blur(10px);
        }

        .info { color: #fff; font-size: 14px; font-weight: bold; }
        .info span { color: var(--neon); font-size: 20px; }
        
        #btn-start {
            background: var(--neon); color: #000; border: none; padding: 8px 15px;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        /* Iframe untuk muat konten */
        #browser-frame {
            position: absolute; top: 70px; left: 0; width: 100%;
            height: calc(100% - 70px); border: none; background: #fff;
        }

        /* Progress Bar */
        #progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #333; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); transition: 0.5s; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="info">PROGRESS: <span id="count">0</span> / 30</div>
    <button id="btn-start" onclick="startFarming()">MULAI FARMING</button>
</div>

<iframe id="browser-frame" name="farm_frame" sandbox="allow-scripts allow-same-origin allow-forms" src="about:blank"></iframe>
<div id="progress-container"><div id="progress-bar"></div></div>

<script>
    const TASKS = [
        "https://www.bing.com/search?q=weather+in+Medan", "https://www.bing.com/search?q=latest+technology+news+2026",
        "https://www.bing.com/search?q=how+to+learn+python", "https://www.bing.com/search?q=microsoft+rewards+tips",
        "https://www.bing.com/search?q=AHP+method+calculation", "https://www.bing.com/search?q=GIS+mapping+tutorial",
        "https://www.bing.com/search?q=best+food+in+Medan+Tembung", "https://www.bing.com/search?q=stock+market+today",
        "https://www.bing.com/search?q=visual+studio+code+extensions", "https://www.bing.com/search?q=artificial+intelligence+trends",
        "https://www.msn.com/id-id/berita/other/ar-AA22WWCR", "https://www.msn.com/id-id/hiburan/berita/ar-AA22Y4xE",
        "https://www.msn.com/id-id/berita/other/ar-AA22S081", "https://www.msn.com/id-id/ekonomi/bisnis/ar-AA22Y8H8",
        "https://www.msn.com/id-id/ekonomi/ekonomi/ar-AA22XAhc", "https://www.msn.com/id-id/berita/other/ar-AA22Upk5",
        "https://www.msn.com/id-id/berita/other/ar-AA22XbnI", "https://www.msn.com/id-id/berita/other/ar-AA22WXg1",
        "https://www.msn.com/id-id/berita/other/ar-AA21JK92", "https://www.msn.com/id-id/hiburan/berita/ar-AA22XNTb",
        "https://www.msn.com/id-id/berita/other/ar-AA22RHnA", "https://www.msn.com/id-id/ekonomi/other/ar-AA22Txxu",
        "https://www.msn.com/id-id/berita/nasional/ar-AA22UJRX", "https://www.msn.com/id-id/berita/other/ar-AA22XlBH",
        "https://www.msn.com/id-id/berita/other/ar-AA1Vuwsr", "https://www.msn.com/id-id/berita/other/ar-AA22T5B9",
        "https://www.msn.com/id-id/ekonomi/ekonomi/ar-AA22UlQy", "https://www.msn.com/id-id/berita/other/ar-AA22X7gM",
        "https://www.msn.com/id-id/berita/nasional/ar-AA22U9z1", "https://www.msn.com/id-id/berita/other/ar-AA22W8L9"
    ];

    let currentStep = parseInt(sessionStorage.getItem('farm_step')) || 0;
    let isRunning = false;

    function startFarming() {
        isRunning = true;
        document.getElementById('btn-start').innerText = "STOP";
        document.getElementById('btn-start').onclick = stopFarming;
        next();
    }

    function stopFarming() {
        isRunning = false;
        document.getElementById('btn-start').innerText = "MULAI FARMING";
        document.getElementById('btn-start').onclick = startFarming;
        location.reload();
    }

    function next() {
        if (!isRunning) return;
        if (currentStep >= TASKS.length) {
            alert("Selesai, San! 30 Poin aman.");
            sessionStorage.removeItem('farm_step');
            return;
        }

        document.getElementById('count').innerText = currentStep + 1;
        document.getElementById('progress-bar').style.width = ((currentStep + 1) / TASKS.length * 100) + "%";
        
        // Load URL ke Iframe
        document.getElementById('browser-frame').src = TASKS[currentStep];
        
        currentStep++;
        sessionStorage.setItem('farm_step', currentStep);

        // Jeda 6 detik (sesuai standar bot di GitHub itu agar tidak terdeteksi)
        setTimeout(next, 6000);
    }

    // Auto-resume jika halaman ter-refresh
    window.onload = () => {
        if (currentStep > 0) startFarming();
    }
</script>
</body>
</html>
